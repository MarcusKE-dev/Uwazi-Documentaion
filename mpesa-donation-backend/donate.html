<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donate via M‑Pesa</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 400px;
      margin: 40px auto;
      padding: 0 16px;
    }

    h2 {
      color: #1a2233;
    }

    .note {
      background: #fdf3e2;
      border-left: 4px solid #f5b041;
      padding: 12px;
      margin: 16px 0;
      border-radius: 4px;
      font-size: 0.9rem;
      color: #5c4011;
    }

    label {
      display: block;
      margin-top: 16px;
      font-weight: 600;
    }

    input,
    button {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }

    button {
      background: #f5b041;
      color: #081120;
      font-weight: bold;
      border: none;
      cursor: pointer;
      margin-top: 20px;
      transition: background 0.2s;
    }

    button:hover {
      background: #f7c25c;
    }

    button:disabled {
      background: #e6dcc9;
      color: #9a8f76;
      cursor: not-allowed;
    }

    #status {
      margin-top: 16px;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }

    .loading {
      background: #fdf3e2;
      color: #5c4011;
    }

    .success {
      background: #e9f4ee;
      color: #1f6b46;
    }

    .error {
      background: #fbeae6;
      color: #a8341f;
    }
  </style>
</head>

<body>
  <h2>Support UWAZI</h2>
  <p>Enter your M‑Pesa registered phone number and the amount you wish to donate.</p>

  <div class="note">
    <strong>NOT AVAILABLE AT THE MOMENT: COMING SOON</strong>
  </div>

  <form id="donateForm">
    <label for="phone"> M‑Pesa Phone Number</label>
    <input type="tel" id="phone" placeholder="0712345678" required pattern="^(\+?254|0)[17]\d{8}$"
      title="Enter a valid phone number (e.g., 0712345678, 0112345678, or 254712345678)">

    <label for="amount"> Amount (KES)</label>
    <input type="number" id="amount" placeholder="e.g. 100" min="1" required>

    <button type="submit" id="donateBtn">Donate Now</button>
  </form>

  <div id="status"></div>

  <script>
    const form = document.getElementById('donateForm');
    const statusDiv = document.getElementById('status');
    const donateBtn = document.getElementById('donateBtn');

    const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:3000'
      : window.location.origin;
    const BACKEND_URL = `${API_BASE}/api/donate`;
    const STATUS_URL = `${API_BASE}/api/payment-status`;

    let paymentPollTimer = null;
    let pollAttempts = 0;
    let consecutiveNetworkErrors = 0;
    const MAX_CONSECUTIVE_NETWORK_ERRORS = 5; // only give up after repeated real failures, not one blip

    function clearPaymentPolling() {
      if (paymentPollTimer) {
        clearInterval(paymentPollTimer);
        paymentPollTimer = null;
      }
      pollAttempts = 0;
      consecutiveNetworkErrors = 0;
    }

    function setBusy(isBusy) {
      donateBtn.disabled = isBusy;
      donateBtn.textContent = isBusy ? 'Processing…' : 'Donate Now';
    }

    function showStatus(message, className, show = true) {
      statusDiv.className = className;
      statusDiv.textContent = message;
      statusDiv.style.display = show ? 'block' : 'none';
    }

    async function pollPaymentStatus(checkoutRequestId) {
      const maxAttempts = 180; // 15 minutes at 5-second intervals

      const checkStatus = async () => {
        pollAttempts += 1;

        try {
          const response = await fetch(`${STATUS_URL}/${checkoutRequestId}`, {
            method: 'GET',
            headers: { 'Content-Type': 'application/json' }
          });

          if (!response.ok) {
            // A single failed HTTP call is not the end of the world — the
            // backend usually still returns pending/failed as normal JSON,
            // so this branch is now rare. Treat it as a transient blip.
            throw new Error(`Status check returned ${response.status}`);
          }

          const data = await response.json();
          consecutiveNetworkErrors = 0; // this attempt succeeded, reset the blip counter

          if (data.status === 'success') {
            clearPaymentPolling();
            showStatus(
              `✅ Donation received. Thank you! Receipt: ${data.receiptNumber || 'N/A'}`,
              'success'
            );
            form.reset();
            setBusy(false);
            return;
          }

          if (data.status === 'failed') {
            clearPaymentPolling();
            const errorMsg = data.message || data.userMessage || 'Payment failed';
            showStatus(`❌ ${errorMsg}`, 'error');
            setBusy(false);
            return;
          }

          // Still pending — this is the normal state while the user is
          // looking at their phone. Keep polling.
          if (pollAttempts >= maxAttempts) {
            clearPaymentPolling();
            showStatus(
              '⏰ Payment confirmation took too long. If you already paid, your money is safe. Please check your M-Pesa statement, or try again.',
              'error'
            );
            setBusy(false);
            return;
          }

          showStatus(
            data.userMessage || `⏳ Waiting for payment confirmation... (${Math.floor(pollAttempts * 5 / 60)}m)`,
            'loading'
          );
        } catch (err) {
          // A single network hiccup should NOT end the whole flow — only
          // stop polling after several in a row, since the payment may
          // well still be going through on Safaricom's side.
          consecutiveNetworkErrors += 1;
          console.warn(`Poll attempt ${pollAttempts} failed (${consecutiveNetworkErrors} in a row):`, err);

          if (consecutiveNetworkErrors >= MAX_CONSECUTIVE_NETWORK_ERRORS) {
            clearPaymentPolling();
            showStatus('❌ Unable to verify payment. Please check your M-Pesa statement to confirm.', 'error');
            setBusy(false);
            return;
          }

          if (pollAttempts >= maxAttempts) {
            clearPaymentPolling();
            showStatus('⏰ Payment confirmation took too long. Please check your M-Pesa statement.', 'error');
            setBusy(false);
            return;
          }

          showStatus('⏳ Still checking payment status...', 'loading');
        }
      };

      // Give Safaricom (and the user) a few seconds before the first check —
      // querying immediately almost always returns "still processing".
      await new Promise((resolve) => setTimeout(resolve, 4000));
      await checkStatus();
      if (paymentPollTimer === null) {
        paymentPollTimer = setInterval(checkStatus, 5000);
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearPaymentPolling();

      let rawPhone = document.getElementById('phone').value.replace(/\s+/g, '').trim();
      const amount = parseInt(document.getElementById('amount').value.trim(), 10);

      if (!rawPhone || !amount || amount < 1) {
        showStatus('❌ Please enter a valid phone number and amount', 'error');
        return;
      }

      if (rawPhone.startsWith('+')) {
        rawPhone = rawPhone.substring(1);
      }
      if (rawPhone.startsWith('0')) {
        rawPhone = '254' + rawPhone.substring(1);
      }

      const formattedPhone = rawPhone;

      setBusy(true);
      showStatus(`⏳ Requesting M-Pesa prompt for ${formattedPhone}...`, 'loading');

      try {
        const response = await fetch(BACKEND_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: formattedPhone, amount: String(amount) })
        });

        const data = await response.json();
        console.log('Donate response:', { status: response.status, ok: response.ok, data });

        if (response.ok && (data.ResponseCode === '0' || data.success === true)) {
          showStatus(
            '✅ Payment request sent! Check your phone and enter your M-Pesa PIN to complete.',
            'success'
          );

          if (data.checkoutRequestId) {
            pollPaymentStatus(data.checkoutRequestId);
          } else {
            console.warn('No checkoutRequestId in response:', data);
            setBusy(false);
          }
        } else {
          const errorMsg = data.error || data.message || data.ErrorMessage || 'Payment request failed';
          throw new Error(errorMsg);
        }
      } catch (err) {
        clearPaymentPolling();
        console.error('Submit error:', err);
        showStatus(`❌ ${err.message || 'Unable to process payment. Please try again.'}`, 'error');
        setBusy(false);
      }
    });
  </script>
</body>

</html>
